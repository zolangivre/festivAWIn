<div class="add-session">
    <h1>Créer session dépôt-vente</h1>
    <form [formGroup]="sessionForm" (ngSubmit)="addSession()">
        <div class="date-range-container">
            <mat-form-field appearance="fill">
                <mat-label>Période de la session</mat-label>
                <mat-date-range-input [formGroup]="sessionForm" [rangePicker]="picker">
                    <input matStartDate formControlName="dateDebut" placeholder="Date de début" />
                    <input matEndDate formControlName="dateFin" placeholder="Date de fin" />
                </mat-date-range-input>
                <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
                <mat-date-range-picker touchUi #picker>
                    <mat-datepicker-actions>
                        <button mat-button matDatepickerCancel>Annuler</button>
                        <button mat-raised-button matDatepickerApply>Appliquer</button>
                    </mat-datepicker-actions>
                </mat-date-range-picker>
            </mat-form-field>
        </div>

        <div class="time-container">
            <mat-form-field appearance="fill">
                <mat-label>Heure de début</mat-label>
                <input matInput [formControl]="formControl" [matTimepicker]="picker" formControlName="heureDebut">
                <mat-timepicker-toggle matIconSuffix [for]="picker" />
                <mat-timepicker #picker />
            </mat-form-field>
            <mat-form-field appearance="fill">
                <mat-label>Heure de fin</mat-label>
                <input matInput type="time" formControlName="heureFin" />
            </mat-form-field>
        </div>

        <mat-form-field appearance="fill">
            <mat-label>Frais de dépôt (en %)</mat-label>
            <input matInput formControlName="fraisDepot" type="number" />
        </mat-form-field>
        <mat-form-field appearance="fill">
            <mat-label>Commission de ventes (en %)</mat-label>
            <input matInput formControlName="commission" type="number" />
        </mat-form-field>

        <div class="button-container">
            <button mat-raised-button color="warn" (click)="goBack()">Retour</button>
            <button mat-raised-button color="primary" type="submit" [disabled]="sessionForm.invalid">Créer
                session</button>
        </div>
    </form>
</div>
