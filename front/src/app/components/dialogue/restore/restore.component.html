<h1 mat-dialog-title>Confirmation de restauration</h1>
<mat-dialog-content>
    <p>Voulez-vous vraiment restaurez ce jeu ?</p>
    <div mat-dialog-actions>
        <button mat-button [mat-dialog-close]="false">Annuler</button>
        <button mat-raised-button color="warn" [mat-dialog-close]="true">Restaurer</button>
    </div>
