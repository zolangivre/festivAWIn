<div class="container">
    <h1>Toutes les sessions</h1>
    <table mat-table [dataSource]="dataSource" matSort (matSortChange)="announceSortChange($event)"
        class="mat-elevation-z8">
        <ng-container matColumnDef="dateDebut">
            <th mat-header-cell *matHeaderCellDef mat-sort-header="dateDebut"> Date de début </th>
            <td mat-cell *matCellDef="let session"> {{ session.dateDebut | date:'shortDate':'fr' }} </td>
        </ng-container>
        <ng-container matColumnDef="dateFin">
            <th mat-header-cell *matHeaderCellDef mat-sort-header="dateFin"> Date de fin </th>
            <td mat-cell *matCellDef="let session"> {{ session.dateFin | date:'shortDate':'fr' }} </td>
        </ng-container>
        <ng-container matColumnDef="fraisDepot">
            <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by number"> Frais de dépôt
            </th>
            <td mat-cell *matCellDef="let session"> {{ session.fraisDepot | number }} % </td>
        </ng-container>
        <ng-container matColumnDef="commission">
            <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by number"> Commission de ventes
            </th>
            <td mat-cell *matCellDef="let session"> {{ session.commission | number }} % </td>
        </ng-container>
        <ng-container matColumnDef="statutSession">
            <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by name"> Statut
            </th>
            <td mat-cell *matCellDef="let session"> {{ session.statutSession }} </td>
        </ng-container>
        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let session">
                <button mat-button type="button" (click)="toggleBilanGeneral(session)" color="warn">Voir le bilan</button>
                <button mat-button type="button" (click)="deleteSession(session)" color="warn">Supprimer</button>
            </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="Select page of jeux">
    </mat-paginator>
    <button mat-raised-button class="add-session-button" (click)="goToAddSession()">
        Créer une nouvelle session
    </button>
</div>
