<h1 mat-dialog-title>Confirmation de dépôt</h1>
<mat-dialog-content>
    <p>Êtes vous sur de vouloir faire le dépôt ?</p>
    <p>La somme totale des frais de dépôt est de : {{ data.sommeFraisDepot + '€'}}</p>
    <div mat-dialog-actions>
        <button mat-button [mat-dialog-close]="false">Annuler</button>
        <button mat-button color="warn" [mat-dialog-close]="true">Comfirmer</button>
    </div>
